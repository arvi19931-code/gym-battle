<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gym Battle Pro v0.4.0</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            padding: 12px;
            min-height: 100vh;
            max-width: 500px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        /* Стартовые экраны */
        .start-screen {
            background: #161b22;
            border-radius: 24px;
            padding: 32px 24px;
            text-align: center;
        }
        .app-title {
            font-size: 32px;
            font-weight: 900;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #3fb950, #f0883e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .app-subtitle {
            color: #8b949e;
            margin-bottom: 32px;
            font-size: 14px;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .input-label {
            display: block;
            margin-bottom: 8px;
            color: #8b949e;
            font-size: 14px;
        }
        .start-input {
            width: 100%;
            background: #0d1117;
            border: 2px solid #30363d;
            color: white;
            padding: 14px 16px;
            border-radius: 16px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }
        .start-input:focus {
            border-color: #f0883e;
        }
        .start-btn {
            width: 100%;
            padding: 16px;
            border-radius: 40px;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 12px;
        }
        .code-display {
            background: #0d1117;
            border: 2px dashed #f0883e;
            border-radius: 16px;
            padding: 20px;
            margin: 20px 0;
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 4px;
            color: #f0883e;
            font-family: monospace;
        }
        .role-badge {
            background: #238636;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            display: inline-block;
            margin: 12px 0;
            font-size: 18px;
        }
        .role-badge.player2 {
            background: #9e6a03;
        }
        .divider {
            display: flex;
            align-items: center;
            color: #8b949e;
            margin: 20px 0;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #30363d;
        }
        .divider span {
            padding: 0 16px;
        }
        .hint-text {
            color: #8b949e;
            font-size: 13px;
            margin-top: 16px;
        }
        .error-text {
            color: #f85149;
            font-size: 14px;
            margin-top: 8px;
        }
        
        /* Основное приложение */
        .profile-section {
            background: #161b22;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .profile-row {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .profile-avatar {
            width: 45px;
            height: 45px;
            background: #238636;
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: bold;
        }
        .profile-avatar.player2-avatar {
            background: #9e6a03;
        }
        .profile-info { flex: 1; min-width: 100px; }
        .profile-name { font-size: 16px; font-weight: bold; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
        .profile-status-row { 
            font-size: 12px; 
            color: #8b949e; 
            margin-top: 2px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .player-status {
            display: flex;
            align-items: center;
            gap: 4px;
            background: #1a2329;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 11px;
        }
        .vs-badge { background: #f0883e; padding: 4px 8px; border-radius: 20px; font-weight: bold; font-size: 12px; }
        .admin-badge { background: #9e6a03; color: white; padding: 2px 8px; border-radius: 12px; font-size: 11px; margin-left: 6px; }
        .status-bar {
            display: flex;
            gap: 6px;
            margin-top: 12px;
            flex-wrap: wrap;
        }
        .status-btn {
            background: #21262d;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .status-btn.active {
            background: #1a3322;
            border-color: #238636;
        }
        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 16px;
            background: #161b22;
            padding: 5px;
            border-radius: 50px;
            overflow-x: auto;
        }
        .tab {
            flex: 1;
            padding: 10px 4px;
            text-align: center;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            background: transparent;
            color: #8b949e;
            border: none;
            font-size: 11px;
            white-space: nowrap;
        }
        .tab.active { background: #238636; color: white; }
        .bank-card {
            background: linear-gradient(145deg, #1a2e22, #0d1f15);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #2ea043;
        }
        .bank-amount { font-size: 48px; font-weight: 900; color: #a5d6ff; }
        button {
            background: #21262d;
            border: none;
            color: #c9d1d9;
            padding: 8px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            border: 1px solid #30363d;
        }
        .btn-primary { background: #238636; border-color: #2ea043; color: white; }
        .btn-danger { background: #da3633; border-color: #f85149; color: white; }
        .btn-warning { background: #9e6a03; border-color: #d29922; color: white; }
        .btn-sm { padding: 4px 8px; font-size: 12px; }
        .logout-btn {
            background: transparent;
            border: 1px solid #f85149;
            color: #f85149;
            padding: 4px 8px;
            font-size: 11px;
        }
        .settings-input {
            width: 100%;
            background: #0d1117;
            border: 1px solid #30363d;
            color: white;
            padding: 12px;
            border-radius: 10px;
            margin: 8px 0;
        }
        
        /* Календарь и история */
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 16px; }
        .calendar-day-header { text-align: center; font-weight: bold; color: #8b949e; padding: 8px 0; font-size: 12px; }
        .calendar-day {
            background: #161b22;
            border-radius: 8px;
            padding: 8px 4px;
            text-align: center;
            cursor: pointer;
            border: 1px solid #30363d;
            min-height: 60px;
        }
        .calendar-day.today { border: 2px solid #f0883e; }
        .calendar-day.past { opacity: 0.5; }
        .calendar-day.future { background: #1a2329; }
        .calendar-day.workout-day { background: #1a3322; border-color: #238636; }
        .calendar-day-number { font-weight: bold; margin-bottom: 4px; }
        .calendar-day-label { font-size: 10px; color: #8b949e; }
        .calendar-legend { display: flex; gap: 12px; margin: 16px 0; }
        .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; }
        .legend-color { width: 16px; height: 16px; border-radius: 4px; }
        
        .history-item {
            background: #161b22;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 12px;
        }
        .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .history-date { font-weight: bold; }
        .history-player { color: #8b949e; font-size: 14px; }
        .history-exercise { background: #0d1117; border-radius: 8px; padding: 10px; margin-top: 8px; }
        .history-ex-name { font-weight: bold; margin-bottom: 6px; color: #f0883e; }
        .history-sets { display: flex; flex-wrap: wrap; gap: 8px; }
        .history-set { background: #21262d; padding: 4px 10px; border-radius: 20px; font-size: 13px; }
        .expand-btn { background: transparent; color: #8b949e; padding: 4px 8px; font-size: 12px; border: 1px solid #30363d; }
        .month-header {
            background: #21262d;
            padding: 10px 16px;
            border-radius: 12px;
            margin: 16px 0 8px;
            font-weight: bold;
            color: #f0883e;
        }
        .delete-history-btn {
            background: transparent;
            border: 1px solid #f85149;
            color: #f85149;
            padding: 2px 8px;
            font-size: 11px;
            margin-left: 8px;
        }
        .version-badge {
            background: #1a2329;
            color: #8b949e;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 11px;
            margin-left: 8px;
        }
        .about-section {
            margin-top: 24px;
            padding: 16px;
            background: #1a2329;
            border-radius: 12px;
            text-align: center;
        }
        .about-text { color: #8b949e; font-size: 13px; line-height: 1.5; }
        .about-author { color: #f0883e; font-weight: bold; margin-top: 8px; }
        
        .admin-panel {
            margin-top: 20px;
            padding: 16px;
            background: #1a2329;
            border-radius: 12px;
            border: 1px solid #9e6a03;
        }
        .admin-title { color: #d29922; font-weight: bold; margin-bottom: 12px; }
        .progress-edit { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; }
        .progress-edit input {
            flex: 1;
            background: #0d1117;
            border: 1px solid #30363d;
            color: white;
            padding: 8px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<div id="app">Загрузка...</div>

<script>
(function() {
    // ---------- КОНФИГУРАЦИЯ ----------
    const APP_VERSION = '0.4.0-alpha';
    const INVITE_CODE = 'ARVI-GYM-2026';
    const PAIR_PASSWORD = 'gym2026';
    const FIXED_NAMES = {
        admin: 'Арви',
        player2: 'Рейкин'
    };
    
    // Статусы
    const STATUSES = {
        home: { icon: '🏠', text: 'Дома' },
        going: { icon: '🚗', text: 'Еду' },
        training: { icon: '🏋️', text: 'Тренируюсь' },
        skip: { icon: '😴', text: 'Пропущу' }
    };
    
    // ---------- ГЛОБАЛЬНОЕ СОСТОЯНИЕ ----------
    let pairData = null;          // Данные текущей пары
    let currentPlayer = null;     // 'admin' или 'player2'
    let isAuthenticated = false;  // Вошёл ли пользователь
    let currentTab = 'training';
    let calendarMonth = new Date();
    let expandedHistory = {};
    let viewingPartnerHistory = false;
    
    let appState = {
        bank: 0,
        currentDayIndex: 0,
        templates: { 'Спина': [], 'Трицепс': [], 'Плечи': [], 'Пресс': [], 'Грудь': [], 'Бицепс': [] },
        currentExercises: [],
        history: [],
        selectedDate: new Date().toISOString().split('T')[0],
        schedule: []
    };
    
    const DAY_CONFIG = [
        { groups: ['Спина', 'Трицепс'], name: 'СПИНА + ТРИЦЕПС', type: 'spina' },
        { groups: ['Плечи', 'Пресс'], name: 'ПЛЕЧИ + ПРЕСС', type: 'plechi' },
        { groups: ['Грудь', 'Бицепс'], name: 'ГРУДЬ + БИЦЕПС', type: 'grud' }
    ];
    
    const MONTH_NAMES = ['Январь', 'Февраль', 'Март', 'Апрель', 'Май', 'Июнь', 'Июль', 'Август', 'Сентябрь', 'Октябрь', 'Ноябрь', 'Декабрь'];

    // ---------- УТИЛИТЫ ----------
    function generateDeviceId() {
        let id = localStorage.getItem('gym_device_id');
        if (!id) {
            id = 'dev_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('gym_device_id', id);
        }
        return id;
    }
    
    const deviceId = generateDeviceId();

    // ---------- ЗАГРУЗКА ДАННЫХ ----------
    function loadPairFromStorage() {
        const saved = localStorage.getItem('gym_pair_data');
        if (saved) {
            try {
                pairData = JSON.parse(saved);
                return true;
            } catch(e) {}
        }
        return false;
    }
    
    function savePairToStorage() {
        if (pairData) {
            localStorage.setItem('gym_pair_data', JSON.stringify(pairData));
        }
    }
    
    function loadSession() {
        const session = localStorage.getItem('gym_session');
        if (session) {
            try {
                const sess = JSON.parse(session);
                if (sess.pairId && loadPairFromStorage()) {
                    if (pairData.pairId === sess.pairId) {
                        currentPlayer = sess.player;
                        isAuthenticated = true;
                        
                        // Загружаем данные приложения
                        if (pairData.data) {
                            appState = { ...appState, ...pairData.data };
                        }
                        if (!appState.templates['Спина']?.length) initDemoData();
                        loadExercises();
                        return true;
                    }
                }
            } catch(e) {}
        }
        return false;
    }
    
    function saveSession() {
        if (pairData && currentPlayer) {
            localStorage.setItem('gym_session', JSON.stringify({
                pairId: pairData.pairId,
                player: currentPlayer,
                timestamp: Date.now()
            }));
        }
    }
    
    function clearSession() {
        localStorage.removeItem('gym_session');
        isAuthenticated = false;
        currentPlayer = null;
    }
    
    function saveAppState() {
        if (pairData) {
            pairData.data = appState;
            savePairToStorage();
            syncWithGist();
        }
    }
    
    function loadExercises() {
        const groups = DAY_CONFIG[appState.currentDayIndex].groups;
        let newList = [];
        groups.forEach(group => {
            (appState.templates[group] || []).forEach(t => {
                newList.push({
                    id: Date.now() + Math.random() + '',
                    group: group,
                    name: t.name,
                    sets: t.sets || [{ weight: 20, reps: 15 }]
                });
            });
        });
        appState.currentExercises = newList;
    }
    
    function initDemoData() {
        if (!appState.templates['Спина']?.length) {
            appState.templates['Спина'] = [{ name: 'Тяга верхнего блока', sets: [{ weight: 20, reps: 15 }, { weight: 40, reps: 12 }, { weight: 60, reps: 10 }] }];
            appState.templates['Трицепс'] = [{ name: 'Жим узким', sets: [{ weight: 50, reps: 12 }] }];
            appState.templates['Плечи'] = [{ name: 'Жим гантелей', sets: [{ weight: 22, reps: 12 }] }];
            appState.templates['Пресс'] = [{ name: 'Скручивания', sets: [{ weight: 10, reps: 15 }] }];
            appState.templates['Грудь'] = [{ name: 'Жим лёжа', sets: [{ weight: 60, reps: 10 }] }];
            appState.templates['Бицепс'] = [{ name: 'ПШНБ', sets: [{ weight: 30, reps: 12 }] }];
        }
    }
    
    function isAdmin() {
        return isAuthenticated && currentPlayer === 'admin';
    }

    // ---------- GIST СИНХРОНИЗАЦИЯ ----------
    async function syncWithGist() {
        if (!pairData?.githubToken) return false;
        
        try {
            const cloudState = {
                bank: appState.bank,
                profile: { 
                    name: FIXED_NAMES.admin, 
                    progress: pairData.admin?.progress || 0, 
                    status: pairData.admin?.status || 'home' 
                },
                partner: { 
                    name: FIXED_NAMES.player2, 
                    progress: pairData.player2?.progress || 0, 
                    status: pairData.player2?.status || 'home' 
                },
                history: appState.history,
                schedule: appState.schedule
            };
            
            await fetch(`https://api.github.com/gists/${pairData.gistId}`, {
                method: 'PATCH',
                headers: {
                    'Authorization': `token ${pairData.githubToken}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    files: { 'gym_data.json': { content: JSON.stringify(cloudState, null, 2) } }
                })
            });
            return true;
        } catch(e) {
            console.warn('Sync error:', e);
            return false;
        }
    }
    
    async function loadFromGist() {
        if (!pairData?.githubToken) return false;
        
        try {
            const response = await fetch(`https://api.github.com/gists/${pairData.gistId}`, {
                headers: { 'Authorization': `token ${pairData.githubToken}` }
            });
            
            if (response.ok) {
                const gist = await response.json();
                const content = gist.files['gym_data.json']?.content;
                if (content) {
                    const cloudState = JSON.parse(content);
                    
                    if (cloudState.bank !== undefined) appState.bank = cloudState.bank;
                    if (cloudState.history) appState.history = cloudState.history;
                    if (cloudState.schedule) appState.schedule = cloudState.schedule;
                    
                    if (cloudState.profile) {
                        pairData.admin.progress = cloudState.profile.progress || 0;
                        pairData.admin.status = cloudState.profile.status || 'home';
                    }
                    if (cloudState.partner) {
                        pairData.player2.progress = cloudState.partner.progress || 0;
                        pairData.player2.status = cloudState.partner.status || 'home';
                    }
                    
                    savePairToStorage();
                    return true;
                }
            }
            return false;
        } catch(e) {
            console.warn('Load error:', e);
            return false;
        }
    }

    // ---------- СОЗДАНИЕ ПАРЫ (только админ) ----------
    function createPair(githubToken, pairPassword, adminPin) {
        if (pairPassword !== PAIR_PASSWORD) {
            alert('Неверный пароль пары!');
            return false;
        }
        
        const gistId = githubToken.split('').reduce((acc, char) => acc + char.charCodeAt(0), 0).toString(16).substr(0, 32);
        
        pairData = {
            pairId: 'pair_' + Date.now(),
            inviteCode: INVITE_CODE,
            pairPassword: PAIR_PASSWORD,
            githubToken: githubToken,
            gistId: gistId || 'd03a67ce07bf4d0ef42cc31824b7f396',
            admin: {
                deviceId: deviceId,
                name: FIXED_NAMES.admin,
                pin: adminPin,
                progress: 0,
                status: 'home'
            },
            player2: {
                deviceId: null,
                name: FIXED_NAMES.player2,
                pin: null,
                progress: 0,
                status: 'home'
            },
            data: null
        };
        
        initDemoData();
        pairData.data = appState;
        savePairToStorage();
        
        currentPlayer = 'admin';
        isAuthenticated = true;
        saveSession();
        
        return true;
    }

    // ---------- ПРИСОЕДИНЕНИЕ К ПАРЕ (игрок 2) ----------
    function joinPair(inviteCode, playerPin) {
        if (!pairData) {
            alert('Пара не найдена! Сначала админ должен создать пару.');
            return false;
        }
        
        if (inviteCode !== pairData.inviteCode) {
            alert('Неверный код приглашения!');
            return false;
        }
        
        if (pairData.player2.pin && pairData.player2.pin !== playerPin) {
            alert('Неверный PIN!');
            return false;
        }
        
        // Если первый вход — сохраняем PIN
        if (!pairData.player2.pin) {
            pairData.player2.pin = playerPin;
        }
        
        pairData.player2.deviceId = deviceId;
        savePairToStorage();
        
        currentPlayer = 'player2';
        isAuthenticated = true;
        saveSession();
        
        // Загружаем данные
        if (pairData.data) {
            appState = { ...appState, ...pairData.data };
        }
        loadExercises();
        
        return true;
    }

    // ---------- ВХОД ПО PIN ----------
    function loginWithPin(pin) {
        if (!pairData) return false;
        
        if (currentPlayer === 'admin') {
            if (pin === pairData.admin.pin) {
                isAuthenticated = true;
                saveSession();
                return true;
            }
        } else if (currentPlayer === 'player2') {
            if (pin === pairData.player2.pin) {
                isAuthenticated = true;
                saveSession();
                return true;
            }
        }
        
        alert('Неверный PIN!');
        return false;
    }

    // ---------- ОБНОВЛЕНИЕ СТАТУСА ----------
    async function updateStatus(newStatus) {
        if (!isAuthenticated) return;
        
        if (currentPlayer === 'admin') {
            pairData.admin.status = newStatus;
        } else {
            pairData.player2.status = newStatus;
        }
        
        savePairToStorage();
        await syncWithGist();
        render();
    }

    // ---------- ЗАВЕРШЕНИЕ ТРЕНИРОВКИ ----------
    async function finishTraining(isDone) {
        if (!isAuthenticated) return;
        
        const groups = DAY_CONFIG[appState.currentDayIndex].groups;
        groups.forEach(group => {
            const exs = appState.currentExercises.filter(e => e.group === group);
            appState.templates[group] = exs.map(e => ({
                name: e.name,
                sets: e.sets.map(s => ({ weight: s.weight, reps: s.reps }))
            }));
        });
        
        let progress = 0;
        if (isDone) {
            progress = 2.5;
            appState.bank += 100;
            if (currentPlayer === 'admin') pairData.admin.progress += 2.5;
            else pairData.player2.progress += 2.5;
            
            groups.forEach(group => {
                const exs = appState.currentExercises.filter(e => e.group === group);
                appState.templates[group] = exs.map(e => ({
                    name: e.name,
                    sets: e.sets.map(s => ({ ...s, weight: s.weight + 2.5 }))
                }));
            });
            
            if (currentPlayer === 'admin') pairData.admin.status = 'home';
            else pairData.player2.status = 'home';
        } else {
            appState.bank += 200;
            if (currentPlayer === 'admin') pairData.admin.status = 'skip';
            else pairData.player2.status = 'skip';
        }
        
        appState.history.push({
            id: Date.now() + Math.random(),
            date: appState.selectedDate,
            dayIndex: appState.currentDayIndex,
            dayName: DAY_CONFIG[appState.currentDayIndex].name,
            player: currentPlayer,
            playerName: currentPlayer === 'admin' ? FIXED_NAMES.admin : FIXED_NAMES.player2,
            completed: isDone,

    function renderCalendarTab() {
        const year = calendarMonth.getFullYear();
        const month = calendarMonth.getMonth();
        const firstDay = new Date(year, month, 1);
        const lastDay = new Date(year, month + 1, 0);
        let startDay = firstDay.getDay();
        if (startDay === 0) startDay = 7;
        
        let html = `
            <div class="calendar-header">
                <button onclick="window.prevMonth()">←</button>
                <h2>${calendarMonth.toLocaleString('ru', { month: 'long', year: 'numeric' })}</h2>
                <button onclick="window.nextMonth()">→</button>
            </div>
            
            <div class="calendar-grid">
                <div class="calendar-day-header">Пн</div><div class="calendar-day-header">Вт</div><div class="calendar-day-header">Ср</div>
                <div class="calendar-day-header">Чт</div><div class="calendar-day-header">Пт</div><div class="calendar-day-header">Сб</div><div class="calendar-day-header">Вс</div>
        `;
        
        for (let i = 1; i < startDay; i++) {
            html += `<div class="calendar-day" style="opacity: 0.3;"></div>`;
        }
        
        const now = new Date();
        const today = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
        
        for (let d = 1; d <= lastDay.getDate(); d++) {
            const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            const workout = appState.schedule.find(w => w.date === dateStr);
            const isToday = dateStr === today;
            
            const checkDate = new Date(year, month, d);
            const todayDate = new Date();
            todayDate.setHours(0, 0, 0, 0);
            const isPast = checkDate < todayDate;
            
            let classes = 'calendar-day';
            if (isToday) classes += ' today';
            if (isPast) classes += ' past';
            if (!isPast && !isToday) classes += ' future';
            if (workout) classes += ' workout-day';
            
            html += `
                <div class="${classes}" onclick="window.selectDate('${dateStr}', '${workout?.type || ''}')">
                    <div class="calendar-day-number">${d}</div>
                    <div class="calendar-day-label">${workout ? workout.description : ''}</div>
                </div>
            `;
        }
        
        html += `</div>`;
        
        html += `
            <div class="calendar-legend">
                <div class="legend-item"><div class="legend-color" style="background: #1a3322;"></div> Тренировка</div>
                <div class="legend-item"><div class="legend-color" style="border: 2px solid #f0883e;"></div> Сегодня</div>
            </div>
        `;
        
        if (isAdmin()) {
            const todayForInput = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
            html += `
                <div style="background: #161b22; border-radius: 16px; padding: 16px; margin-top: 20px;">
                    <h3>✏️ Редактор расписания</h3>
                    <div style="display: flex; gap: 8px; margin: 12px 0;">
                        <input type="date" id="newWorkoutDate" class="settings-input" style="flex: 1;" value="${todayForInput}">
                        <select id="newWorkoutType" class="settings-input" style="flex: 1;">
                            <option value="spina">Спина+Трицепс</option>
                            <option value="plechi">Плечи+Пресс</option>
                            <option value="grud">Грудь+Бицепс</option>
                        </select>
                    </div>
                    <button class="btn-primary" onclick="window.addWorkout()" style="width: 100%;">➕ Добавить тренировку</button>
                    
                    <h4 style="margin: 20px 0 10px;">📋 Запланировано:</h4>
                    ${appState.schedule.sort((a,b) => a.date.localeCompare(b.date)).map((w, i) => `
                        <div class="workout-item">
                            <div>
                                <span>${w.date}</span>
                                <span class="workout-type type-${w.type}">${w.description}</span>
                            </div>
                            <button onclick="window.removeWorkout(${i})" class="btn-danger" style="padding: 4px 8px;">🗑️</button>
                        </div>
                    `).join('')}
                </div>
            `;
        }
        
        return html;
    }

                        h.exercises.forEach(ex => {
                            html += `
                                <div class="history-exercise">
                                    <div class="history-ex-name">${ex.name} (${ex.group})</div>
                                    <div class="history-sets">
                                        ${ex.sets.map((s, i) => `
                                            <span class="history-set">${i+1}: ${s.weight} кг × ${s.reps}</span>
                                        `).join('')}
                                    </div>
                                </div>
                            `;
                        });
                        html += `</div>`;
                    }
                    
                    html += `</div>`;
                });
            });
        }
        
        html += `</div>`;
        return html;
    }
    
    function renderBattleTab() {
        const my = pairData.admin?.progress || 0;
        const pt = pairData.player2?.progress || 0;
        const leader = my > pt ? FIXED_NAMES.admin : pt > my ? FIXED_NAMES.player2 : 'Ничья';
        
        let html = `
            <div style="background: #161b22; border-radius: 16px; padding: 16px;">
                <h2>⚔️ БАТТЛ</h2>
                
                <div style="background: #0d1117; padding: 12px; border-radius: 10px; margin: 12px 0;">
                    <div style="display: flex; justify-content: space-between;">
                        <span>${FIXED_NAMES.admin} 👑</span>
                        <span style="color: #3fb950; font-size: 24px; font-weight: bold;">+${my.toFixed(1)} кг</span>
                    </div>
                </div>
                
                <div style="background: #0d1117; padding: 12px; border-radius: 10px; margin: 12px 0;">
                    <div style="display: flex; justify-content: space-between;">
                        <span>${FIXED_NAMES.player2}</span>
                        <span style="color: #f0883e; font-size: 24px; font-weight: bold;">+${pt.toFixed(1)} кг</span>
                    </div>
                </div>
                
                <div style="text-align: center; padding: 20px; background: #0d1117; border-radius: 12px; margin-top: 20px;">
                    <h3>🏆 ${leader} ${leader === 'Ничья' ? '' : 'лидирует!'}</h3>
                    <p style="font-size: 18px; margin-top: 8px;">Разница: ${Math.abs(my - pt).toFixed(1)} кг</p>
                </div>
        `;
        
        if (isAdmin()) {
            html += `
                <div class="admin-panel">
                    <div class="admin-title">👑 Админ-панель</div>
                    
                    <div class="progress-edit">
                        <span>${FIXED_NAMES.admin}:</span>
                        <input type="number" id="editProgress1" value="${my.toFixed(1)}" step="0.5">
                        <button onclick="window.updateProgress('admin')" class="btn-sm btn-primary">✓</button>
                    </div>
                    
                    <div class="progress-edit">
                        <span>${FIXED_NAMES.player2}:</span>
                        <input type="number" id="editProgress2" value="${pt.toFixed(1)}" step="0.5">
                        <button onclick="window.updateProgress('player2')" class="btn-sm btn-primary">✓</button>
                    </div>
                    
                    <div style="display: flex; gap: 8px; margin-top: 16px;">
                        <button onclick="window.recalculateProgress()" class="btn-warning" style="flex: 1;">🔄 Пересчитать</button>
                        <button onclick="window.resetAllProgress()" class="btn-danger" style="flex: 1;">⚠️ Сбросить</button>
                    </div>
                </div>
            `;
        }
        
        html += `</div>`;
        return html;
    }
    
    function renderSettingsTab() {
        return `
            <div style="background: #161b22; border-radius: 16px; padding: 16px;">
                <h2>⚙️ Настройки</h2>
                
                <div style="margin: 20px 0; padding: 16px; background: #0d1117; border-radius: 12px;">
                    <p><strong>Пара:</strong> ${FIXED_NAMES.admin} и ${FIXED_NAMES.player2}</p>
                    <p><strong>Код приглашения:</strong> ${pairData?.inviteCode || INVITE_CODE}</p>
                    <p><strong>Вы вошли как:</strong> ${currentPlayer === 'admin' ? FIXED_NAMES.admin + ' 👑' : FIXED_NAMES.player2}</p>
                </div>
                
                <button class="btn-warning" onclick="window.syncNow()" style="width: 100%;">🔄 Синхронизировать</button>
                
                <div class="about-section">
                    <div style="display: flex; justify-content: center; align-items: center; margin-bottom: 8px;">
                        <span style="font-weight: bold;">Gym Battle Pro</span>
                        <span class="version-badge">v${APP_VERSION}</span>
                    </div>
                    <div class="about-text">
                        Приложение сделано Арви для личного использования.<br>
                        Арви (админ) и Рейкин (игрок 2)<br>
                        Тренируйтесь с умом! 💪
                    </div>
                    <div class="about-author">© 2026 Gym Battle</div>
                </div>
            </div>
        `;
    }
    
    function groupHistoryByMonth(historyItems) {
        const groups = {};
        historyItems.forEach(h => {
            const date = new Date(h.date);
            const monthKey = `${date.getFullYear()}-${date.getMonth()}`;
            if (!groups[monthKey]) {
                groups[monthKey] = { year: date.getFullYear(), month: date.getMonth(), items: [] };
            }
            groups[monthKey].items.push(h);
        });
        return Object.values(groups).sort((a, b) => b.year - a.year || b.month - a.month);
    }

    // ---------- ГЛОБАЛЬНЫЕ ФУНКЦИИ ----------
    window.render = () => {
        if (isAuthenticated && pairData) {
            renderMainApp();
        } else {
            renderStartScreen();
        }
    };
    
    window.switchTab = (tab) => { currentTab = tab; render(); };
    window.setStatus = (status) => updateStatus(status);
    window.finishTraining = (isDone) => finishTraining(isDone);
    window.syncNow = async () => {
        await loadFromGist();
        render();
        alert('✅ Синхронизировано!');
    };
    window.viewPartnerHistory = () => { viewingPartnerHistory = true; render(); };
    window.backFromHistory = () => { viewingPartnerHistory = false; render(); };
    window.toggleHistory = (id) => { expandedHistory[id] = !expandedHistory[id]; render(); };
    
    window.prevMonth = () => { calendarMonth.setMonth(calendarMonth.getMonth() - 1); render(); };
    window.nextMonth = () => { calendarMonth.setMonth(calendarMonth.getMonth() + 1); render(); };
    
    window.selectDate = (dateStr, workoutType) => {
        appState.selectedDate = dateStr;
        if (workoutType) {
            const idx = DAY_CONFIG.findIndex(d => d.type === workoutType);
            if (idx >= 0) { appState.currentDayIndex = idx; loadExercises(); }
        }
        currentTab = 'training';
        viewingPartnerHistory = false;
        render();
    };
    
    window.setBank = () => {
        if (!isAdmin()) return;
        const b = prompt('Сумма:', appState.bank);
        if (b !== null && !isNaN(parseFloat(b))) { appState.bank = parseFloat(b); saveAppState(); render(); }
    };
    
    window.addExercise = (group) => {
        const name = prompt('Название:');
        if (name) {
            appState.currentExercises.push({ id: Date.now() + Math.random() + '', group, name, sets: [{ weight: 20, reps: 15 }] });
            render();
        }
    };
    window.deleteEx = (id) => { appState.currentExercises = appState.currentExercises.filter(e => e.id !== id); render(); };
    window.addSet = (id) => {
        const ex = appState.currentExercises.find(e => e.id === id);
        if (ex) { ex.sets.push({ weight: 20, reps: 12 }); render(); }
    };
    window.removeSet = (id, idx) => {
        const ex = appState.currentExercises.find(e => e.id === id);
        if (ex && ex.sets.length > 1) { ex.sets.splice(idx, 1); render(); }
    };
    window.updateSet = (id, idx, field, val) => {
        const ex = appState.currentExercises.find(e => e.id === id);
        if (ex?.sets[idx]) ex.sets[idx][field] = parseFloat(val) || 0;
    };
    window.updateExName = (id, name) => {
        const ex = appState.currentExercises.find(e => e.id === id);
        if (ex) ex.name = name;
    };
    
    window.addWorkout = () => {
        if (!isAdmin()) return;
        const date = document.getElementById('newWorkoutDate')?.value;
        const type = document.getElementById('newWorkoutType')?.value;
        const desc = { spina: 'Спина+Трицепс', plechi: 'Плечи+Пресс', grud: 'Грудь+Бицепс' };
        if (date && type) {
            appState.schedule.push({ date, type, description: desc[type] });
            saveAppState();
            render();
        }
    };
    window.removeWorkout = (i) => { appState.schedule.splice(i, 1); saveAppState(); render(); };
    
    window.deleteHistoryEntry = (id, fallbackIdx) => {
        if (!isAdmin()) return;
        if (confirm('Удалить запись?')) {
            const before = appState.history.length;
            appState.history = appState.history.filter(h => String(h.id) !== String(id));
            if (appState.history.length === before && fallbackIdx !== undefined) {
                appState.history.splice(fallbackIdx, 1);
            }
            saveAppState();
            render();
        }
    };
    
    window.updateProgress = (player) => {
        if (!isAdmin()) return;
        const input = player === 'admin' ? document.getElementById('editProgress1') : document.getElementById('editProgress2');
        const val = parseFloat(input?.value);
        if (!isNaN(val)) {
            if (player === 'admin') pairData.admin.progress = val;
            else pairData.player2.progress = val;
            savePairToStorage();
            syncWithGist();
            render();
        }
    };
    
    window.recalculateProgress = () => {
        if (!isAdmin()) return;
        if (confirm('Пересчитать прогресс из истории?')) {
            pairData.admin.progress = 0;
            pairData.player2.progress = 0;
            appState.history.forEach(h => {
                if (h.completed) {
                    if (h.player === 'admin') pairData.admin.progress += h.progress || 2.5;
                    else pairData.player2.progress += h.progress || 2.5;
                }
            });
            savePairToStorage();
            syncWithGist();
            render();
        }
    };
    
    window.resetAllProgress = () => {
        if (!isAdmin()) return;
        if (confirm('Сбросить весь прогресс?')) {
            pairData.admin.progress = 0;
            pairData.player2.progress = 0;
            savePairToStorage();
            syncWithGist();
            render();
        }
    };

    // Запуск
    render();
})();
</script>
