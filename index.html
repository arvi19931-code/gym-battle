<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gym Battle Pro v0.5.1</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            --bg-input: #0d1117;
            --bg-card: #161b22;
            --bg-hover: #1a2329;
            --text-primary: #c9d1d9;
            --text-secondary: #8b949e;
            --text-accent: #f0883e;
            --border-primary: #30363d;
            --border-accent: #f0883e;
            --success: #238636;
            --success-light: #2ea043;
            --danger: #da3633;
            --danger-light: #f85149;
            --warning: #9e6a03;
            --warning-light: #d29922;
            --admin-badge: #9e6a03;
            --profile-avatar: #238636;
            --gradient-start: #1a2e22;
            --gradient-end: #0d1f15;
            --calendar-workout: #1a3322;
            --shadow: rgba(0,0,0,0.3);
            transition: background-color 0.25s ease, color 0.2s ease, border-color 0.2s ease;
        }
        body.theme-light {
            --bg-primary: #f6f8fa;
            --bg-secondary: #ffffff;
            --bg-tertiary: #f0f2f5;
            --bg-input: #ffffff;
            --bg-card: #ffffff;
            --bg-hover: #e8eaed;
            --text-primary: #1a1a2e;
            --text-secondary: #5c5c70;
            --text-accent: #d2691e;
            --border-primary: #d0d7de;
            --border-accent: #d2691e;
            --success: #1a7f37;
            --success-light: #2da44e;
            --danger: #cf222e;
            --danger-light: #e5534b;
            --warning: #9a6700;
            --warning-light: #bf8700;
            --admin-badge: #9a6700;
            --profile-avatar: #1a7f37;
            --gradient-start: #e6f7e6;
            --gradient-end: #d4edda;
            --calendar-workout: #d4edda;
            --shadow: rgba(0,0,0,0.08);
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            padding: 12px;
            min-height: 100vh;
            max-width: 500px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .start-screen {
            background: var(--bg-secondary);
            border-radius: 24px;
            padding: 32px 24px;
            text-align: center;
            box-shadow: 0 4px 12px var(--shadow);
        }
        .app-title {
            font-size: 32px;
            font-weight: 900;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--success), var(--text-accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .app-subtitle {
            color: var(--text-secondary);
            margin-bottom: 32px;
            font-size: 14px;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .input-label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 14px;
        }
        .start-input {
            width: 100%;
            background: var(--bg-input);
            border: 2px solid var(--border-primary);
            color: var(--text-primary);
            padding: 14px 16px;
            border-radius: 16px;
            font-size: 16px;
            outline: none;
        }
        .start-input:focus { border-color: var(--border-accent); }
        .start-btn {
            width: 100%;
            padding: 16px;
            border-radius: 40px;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 12px;
        }
        .divider {
            display: flex;
            align-items: center;
            color: var(--text-secondary);
            margin: 20px 0;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-primary);
        }
        .divider span { padding: 0 16px; }
        .hint-text { color: var(--text-secondary); font-size: 13px; margin-top: 16px; }
        .role-badge {
            background: var(--success);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            display: inline-block;
            margin: 12px 0;
            font-size: 18px;
        }
        .role-badge.player2 { background: var(--warning); }
        
        .profile-section {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px var(--shadow);
        }
        .profile-row {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .profile-avatar {
            width: 45px;
            height: 45px;
            background: var(--profile-avatar);
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: bold;
            color: white;
        }
        .profile-info { flex: 1; min-width: 100px; }
        .profile-name { font-size: 16px; font-weight: bold; display: flex; align-items: center; gap: 6px; }
        .profile-status-row { 
            font-size: 12px; 
            color: var(--text-secondary); 
            margin-top: 2px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .player-status {
            display: flex;
            align-items: center;
            gap: 4px;
            background: var(--bg-hover);
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 11px;
        }
        .vs-badge { background: var(--text-accent); padding: 4px 8px; border-radius: 20px; font-weight: bold; font-size: 12px; color: white; }
        .admin-badge { background: var(--admin-badge); color: white; padding: 2px 8px; border-radius: 12px; font-size: 11px; margin-left: 6px; }
        .status-bar { display: flex; gap: 6px; margin-top: 12px; flex-wrap: wrap; }
        .status-btn {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-primary);
            color: var(--text-primary);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .status-btn.active { background: var(--success); border-color: var(--success-light); color: white; }
        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 16px;
            background: var(--bg-secondary);
            padding: 5px;
            border-radius: 50px;
            box-shadow: 0 2px 8px var(--shadow);
        }
        .tab {
            flex: 1;
            padding: 10px 4px;
            text-align: center;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            background: transparent;
            color: var(--text-secondary);
            border: none;
            font-size: 11px;
        }
        .tab.active { background: var(--success); color: white; }
        .bank-card {
            background: linear-gradient(145deg, var(--gradient-start), var(--gradient-end));
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--success-light);
            box-shadow: 0 4px 12px var(--shadow);
        }
        .bank-amount { font-size: 48px; font-weight: 900; color: var(--text-primary); }
        button {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-primary);
            color: var(--text-primary);
            padding: 8px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
        }
        .btn-primary { background: var(--success); border-color: var(--success-light); color: white; }
        .btn-danger { background: var(--danger); border-color: var(--danger-light); color: white; }
        .btn-warning { background: var(--warning); border-color: var(--warning-light); color: white; }
        .btn-sm { padding: 4px 8px; font-size: 12px; }
        .logout-btn { background: transparent; border: 1px solid var(--danger); color: var(--danger); }
        .settings-input {
            width: 100%;
            background: var(--bg-input);
            border: 1px solid var(--border-primary);
            color: var(--text-primary);
            padding: 12px;
            border-radius: 10px;
            margin: 8px 0;
        }
        .who-btn {
            flex: 1;
            padding: 12px;
            background: var(--bg-tertiary);
            border: 2px solid var(--border-primary);
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
        }
        .who-btn.active { border-color: var(--success); background: var(--success); color: white; }
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 16px; }
        .calendar-day-header { text-align: center; font-weight: bold; color: var(--text-secondary); padding: 8px 0; font-size: 12px; }
        .calendar-day {
            background: var(--bg-secondary);
            border-radius: 8px;
            padding: 8px 4px;
            text-align: center;
            cursor: pointer;
            border: 1px solid var(--border-primary);
            min-height: 60px;
        }
        .calendar-day.today { border: 2px solid var(--text-accent); }
        .calendar-day.past { opacity: 0.5; }
        .calendar-day.future { background: var(--bg-hover); }
        .calendar-day.workout-day { background: var(--calendar-workout); border-color: var(--success); }
        .calendar-day-number { font-weight: bold; margin-bottom: 4px; }
        .calendar-day-label { font-size: 10px; color: var(--text-secondary); }
        .calendar-legend { display: flex; gap: 12px; margin: 16px 0; }
        .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; }
        .legend-color { width: 16px; height: 16px; border-radius: 4px; }
        .history-item {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 12px;
            box-shadow: 0 2px 4px var(--shadow);
        }
        .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .history-date { font-weight: bold; }
        .history-player { color: var(--text-secondary); font-size: 14px; }
        .history-exercise { background: var(--bg-tertiary); border-radius: 8px; padding: 10px; margin-top: 8px; }
        .history-ex-name { font-weight: bold; margin-bottom: 6px; color: var(--text-accent); }
        .history-sets { display: flex; flex-wrap: wrap; gap: 8px; }
        .history-set { background: var(--bg-hover); padding: 4px 10px; border-radius: 20px; font-size: 13px; }
        .expand-btn { background: transparent; color: var(--text-secondary); padding: 4px 8px; font-size: 12px; border: 1px solid var(--border-primary); }
        .month-header {
            background: var(--bg-tertiary);
            padding: 10px 16px;
            border-radius: 12px;
            margin: 16px 0 8px;
            font-weight: bold;
            color: var(--text-accent);
        }
        .delete-history-btn {
            background: transparent;
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 2px 8px;
            font-size: 11px;
            margin-left: 8px;
        }
        .version-badge {
            background: var(--bg-hover);
            color: var(--text-secondary);
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 11px;
            margin-left: 8px;
        }
        .about-section {
            margin-top: 24px;
            padding: 16px;
            background: var(--bg-tertiary);
            border-radius: 12px;
            text-align: center;
        }
        .about-text { color: var(--text-secondary); font-size: 13px; line-height: 1.5; }
        .about-author { color: var(--text-accent); font-weight: bold; margin-top: 8px; }
        .admin-panel {
            margin-top: 20px;
            padding: 16px;
            background: var(--bg-tertiary);
            border-radius: 12px;
            border: 1px solid var(--warning);
        }
        .admin-title { color: var(--warning-light); font-weight: bold; margin-bottom: 12px; }
        .progress-edit { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; }
        .progress-edit input {
            flex: 1;
            background: var(--bg-input);
            border: 1px solid var(--border-primary);
            color: var(--text-primary);
            padding: 8px;
            border-radius: 8px;
        }
        .workout-item {
            background: var(--bg-tertiary);
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .workout-type { padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: bold; }
        .type-spina { background: var(--success); color: white; }
        .type-plechi { background: var(--warning); color: white; }
        .type-grud { background: var(--danger); color: white; }
        .back-btn { background: transparent; border: 1px solid var(--text-accent); color: var(--text-accent); margin-bottom: 12px; }
        .theme-selector { display: flex; gap: 8px; margin: 16px 0; }
        .theme-btn {
            flex: 1;
            padding: 12px;
            background: var(--bg-tertiary);
            border: 2px solid var(--border-primary);
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
        }
        .theme-btn.active { border-color: var(--success); background: var(--success); color: white; }
    </style>
</head>
<body>
<div id="app">Загрузка...</div>
<script>
(function() {
    const APP_VERSION = '0.5.1-alpha';
    const INVITE_CODE = 'ARVI-GYM-2026';
    const PAIR_PASSWORD = 'gym2026';
    const FIXED_NAMES = { admin: 'Арви', player2: 'Рейкин' };
    const STATUSES = {
        home: { icon: '🏠', text: 'Дома' },
        going: { icon: '🚗', text: 'Еду' },
        training: { icon: '🏋️', text: 'Тренируюсь' },
        skip: { icon: '😴', text: 'Пропущу' }
    };
    
    const THEME_KEY = 'gym_theme';
    let currentTheme = localStorage.getItem(THEME_KEY) || 'dark';
    
    function applyTheme(theme) {
        document.body.classList.remove('theme-light');
        if (theme === 'light') document.body.classList.add('theme-light');
        else if (theme === 'system') {
            if (window.matchMedia('(prefers-color-scheme: light)').matches) document.body.classList.add('theme-light');
        }
        currentTheme = theme;
        localStorage.setItem(THEME_KEY, theme);
    }
    window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', () => {
        if (currentTheme === 'system') applyTheme('system');
    });
    
    let pairData = null;
    let currentPlayer = null;
    let isAuthenticated = false;
    let currentTab = 'training';
    let calendarMonth = new Date();
    let expandedHistory = {};
    let viewingPartnerHistory = false;
    
    let appState = {
        bank: 0,
        currentDayIndex: 0,
        templates: { 'Спина': [], 'Трицепс': [], 'Плечи': [], 'Пресс': [], 'Грудь': [], 'Бицепс': [] },
        currentExercises: [],
        history: [],
        selectedDate: new Date().toISOString().split('T')[0],
        schedule: []
    };
    
    const DAY_CONFIG = [
        { groups: ['Спина', 'Трицепс'], name: 'СПИНА + ТРИЦЕПС', type: 'spina' },
        { groups: ['Плечи', 'Пресс'], name: 'ПЛЕЧИ + ПРЕСС', type: 'plechi' },
        { groups: ['Грудь', 'Бицепс'], name: 'ГРУДЬ + БИЦЕПС', type: 'grud' }
    ];
    const MONTH_NAMES = ['Январь', 'Февраль', 'Март', 'Апрель', 'Май', 'Июнь', 'Июль', 'Август', 'Сентябрь', 'Октябрь', 'Ноябрь', 'Декабрь'];

    function generateDeviceId() {
        let id = localStorage.getItem('gym_device_id');
        if (!id) { id = 'dev_' + Date.now() + '_' + Math.random().toString(36).substr(2,9); localStorage.setItem('gym_device_id', id); }
        return id;
    }
    const deviceId = generateDeviceId();

    function loadPairFromStorage() {
        const saved = localStorage.getItem('gym_pair_data');
        if (saved) try { pairData = JSON.parse(saved); return true; } catch(e) {}
        return false;
    }
    function savePairToStorage() { if (pairData) localStorage.setItem('gym_pair_data', JSON.stringify(pairData)); }
    
    function loadSession() {
        const session = localStorage.getItem('gym_session');
        if (session) {
            try {
                const sess = JSON.parse(session);
                if (sess.pairId && loadPairFromStorage() && pairData.pairId === sess.pairId) {
                    currentPlayer = sess.player;
                    isAuthenticated = true;
                    if (pairData.data) appState = { ...appState, ...pairData.data };
                    if (!appState.templates['Спина']?.length) initDemoData();
                    loadExercises();
                    return true;
                }
            } catch(e) {}
        }
        return false;
    }
    function saveSession() {
        if (pairData && currentPlayer) localStorage.setItem('gym_session', JSON.stringify({ pairId: pairData.pairId, player: currentPlayer }));
    }
    function clearSession() { localStorage.removeItem('gym_session'); isAuthenticated = false; currentPlayer = null; }
    function saveAppState() { if (pairData) { pairData.data = appState; savePairToStorage(); syncWithGist(); } }
    
    function loadExercises() {
        const groups = DAY_CONFIG[appState.currentDayIndex].groups;
        let newList = [];
        groups.forEach(group => {
            (appState.templates[group] || []).forEach(t => {
                newList.push({ id: Date.now()+Math.random()+'', group, name: t.name, sets: t.sets || [{ weight:20, reps:15 }] });
            });
        });
        appState.currentExercises = newList;
    }
    function initDemoData() {
        if (!appState.templates['Спина']?.length) {
            appState.templates['Спина'] = [{ name: 'Тяга верхнего блока', sets: [{ weight:20, reps:15 },{ weight:40, reps:12 },{ weight:60, reps:10 }] }];
            appState.templates['Трицепс'] = [{ name: 'Жим узким', sets: [{ weight:50, reps:12 }] }];
            appState.templates['Плечи'] = [{ name: 'Жим гантелей', sets: [{ weight:22, reps:12 }] }];
            appState.templates['Пресс'] = [{ name: 'Скручивания', sets: [{ weight:10, reps:15 }] }];
            appState.templates['Грудь'] = [{ name: 'Жим лёжа', sets: [{ weight:60, reps:10 }] }];
            appState.templates['Бицепс'] = [{ name: 'ПШНБ', sets: [{ weight:30, reps:12 }] }];
        }
    }
    function isAdmin() { return isAuthenticated && currentPlayer === 'admin'; }

    async function syncWithGist() {
        if (!pairData?.githubToken) return false;
        try {
            const cloudState = {
                bank: appState.bank,
                profile: { name: FIXED_NAMES.admin, progress: pairData.admin?.progress||0, status: pairData.admin?.status||'home' },
                partner: { name: FIXED_NAMES.player2, progress: pairData.player2?.progress||0, status: pairData.player2?.status||'home' },
                history: appState.history,
                schedule: appState.schedule
            };
            await fetch(`https://api.github.com/gists/${pairData.gistId}`, {
                method: 'PATCH',
                headers: { 'Authorization': `token ${pairData.githubToken}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ files: { 'gym_data.json': { content: JSON.stringify(cloudState) } } })
            });
            return true;
        } catch(e) { return false; }
    }
    
    async function loadFromGist(token, gistId) {
        try {
            const resp = await fetch(`https://api.github.com/gists/${gistId}`, {
                headers: { 'Authorization': `token ${token}` }
            });
            if (resp.ok) {
                const gist = await resp.json();
                const content = gist.files['gym_data.json']?.content;
                if (content) {
                    const cloudState = JSON.parse(content);
                    appState.bank = cloudState.bank || 0;
                    appState.history = cloudState.history || [];
                    appState.schedule = cloudState.schedule || [];
                    if (!pairData) pairData = {};
                    pairData.admin = pairData.admin || { progress:0, status:'home' };
                    pairData.player2 = pairData.player2 || { progress:0, status:'home' };
                    if (cloudState.profile) {
                        pairData.admin.progress = cloudState.profile.progress || 0;
                        pairData.admin.status = cloudState.profile.status || 'home';
                    }
                    if (cloudState.partner) {
                        pairData.player2.progress = cloudState.partner.progress || 0;
                        pairData.player2.status = cloudState.partner.status || 'home';
                    }
                    return true;
                }
            }
        } catch(e) {}
        return false;
    }

    async function joinPair(inviteCode, playerPin, githubToken) {
        if (inviteCode !== INVITE_CODE) { alert('Неверный код приглашения!'); return false; }
        if (!githubToken) { alert('Введите GitHub Token!'); return false; }
        
        const gistId = githubToken.split('').reduce((acc, char) => acc + char.charCodeAt(0), 0).toString(16).substr(0, 32);
        const exists = await loadFromGist(githubToken, gistId);
        if (!exists) {
            alert('Пара не найдена в облаке. Проверьте токен или дождитесь, пока админ создаст пару.');
            return false;
        }
        
        pairData = {
            pairId: 'pair_' + Date.now(),
            inviteCode: INVITE_CODE,
            pairPassword: PAIR_PASSWORD,
            githubToken: githubToken,
            gistId: gistId,
            admin: { deviceId: null, name: FIXED_NAMES.admin, pin: null, progress: 0, status: 'home' },
            player2: { deviceId: deviceId, name: FIXED_NAMES.player2, pin: playerPin, progress: 0, status: 'home' },
            data: null
        };
        
        await loadFromGist(githubToken, gistId);
        pairData.data = appState;
        savePairToStorage();
        
        currentPlayer = 'player2';
        isAuthenticated = true;
        saveSession();
        loadExercises();
        return true;
    }

    function createPair(githubToken, pairPassword, adminPin) {
        if (pairPassword !== PAIR_PASSWORD) { alert('Неверный пароль пары!'); return false; }
        const gistId = githubToken.split('').reduce((acc,char)=>acc+char.charCodeAt(0),0).toString(16).substr(0,32);
        pairData = {
            pairId: 'pair_'+Date.now(),
            inviteCode: INVITE_CODE,
            pairPassword: PAIR_PASSWORD,
            githubToken, gistId,
            admin: { deviceId, name: FIXED_NAMES.admin, pin: adminPin, progress:0, status:'home' },
            player2: { deviceId: null, name: FIXED_NAMES.player2, pin: null, progress:0, status:'home' },
            data: null
        };
        initDemoData();
        pairData.data = appState;
        savePairToStorage();
        currentPlayer = 'admin';
        isAuthenticated = true;
        saveSession();
        return true;
    }

    function loginWithPin(pin) {
        if (!pairData) return false;
        if (currentPlayer === 'admin' && pin === pairData.admin.pin) { isAuthenticated = true; saveSession(); return true; }
        if (currentPlayer === 'player2' && pin === pairData.player2.pin) { isAuthenticated = true; saveSession(); return true; }
        alert('Неверный PIN!'); return false;
    }

    async function finishTraining(isDone) {
        if (!isAuthenticated) return;
        const groups = DAY_CONFIG[appState.currentDayIndex].groups;
        groups.forEach(group => {
            const exs = appState.currentExercises.filter(e=>e.group===group);
            appState.templates[group] = exs.map(e=>({ name: e.name, sets: e.sets.map(s=>({ weight: s.weight, reps: s.reps })) }));
        });
        let progress = 0;
        if (isDone) {
            progress = 2.5; appState.bank += 100;
            if (currentPlayer==='admin') pairData.admin.progress += 2.5; else pairData.player2.progress += 2.5;
            groups.forEach(group => {
                const exs = appState.currentExercises.filter(e=>e.group===group);
                appState.templates[group] = exs.map(e=>({ name: e.name, sets: e.sets.map(s=>({...s, weight: s.weight+2.5})) }));
            });
            if (currentPlayer==='admin') pairData.admin.status = 'home'; else pairData.player2.status = 'home';
        } else {
            appState.bank += 200;
            if (currentPlayer==='admin') pairData.admin.status = 'skip'; else pairData.player2.status = 'skip';
        }
        appState.history.push({
            id: Date.now()+Math.random(),
            date: appState.selectedDate, dayIndex: appState.currentDayIndex, dayName: DAY_CONFIG[appState.currentDayIndex].name,
            player: currentPlayer, playerName: currentPlayer==='admin'?FIXED_NAMES.admin:FIXED_NAMES.player2,
            completed: isDone, progress, exercises: JSON.parse(JSON.stringify(appState.currentExercises))
        });
        appState.currentDayIndex = (appState.currentDayIndex+1)%3;
        appState.selectedDate = new Date().toISOString().split('T')[0];
        loadExercises(); saveAppState(); render();
    }

    function renderCalendarTab() {
        const year = calendarMonth.getFullYear(), month = calendarMonth.getMonth();
        const firstDay = new Date(year, month, 1), lastDay = new Date(year, month+1, 0);
        let startDay = firstDay.getDay(); if (startDay===0) startDay=7;
        let html = `<div class="calendar-header"><button onclick="window.prevMonth()">←</button><h2>${calendarMonth.toLocaleString('ru',{month:'long',year:'numeric'})}</h2><button onclick="window.nextMonth()">→</button></div><div class="calendar-grid">`;
        ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'].forEach(d=>html+=`<div class="calendar-day-header">${d}</div>`);
        for (let i=1; i<startDay; i++) html+=`<div class="calendar-day" style="opacity:0.3;"></div>`;
        const now = new Date(), today = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
        for (let d=1; d<=lastDay.getDate(); d++) {
            const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const workout = appState.schedule.find(w=>w.date===dateStr);
            const isToday = dateStr===today;
            const checkDate = new Date(year,month,d), todayDate = new Date(); todayDate.setHours(0,0,0,0);
            const isPast = checkDate < todayDate;
            let classes = 'calendar-day';
            if (isToday) classes += ' today'; if (isPast) classes += ' past'; if (!isPast&&!isToday) classes += ' future'; if (workout) classes += ' workout-day';
            html += `<div class="${classes}" onclick="window.selectDate('${dateStr}','${workout?.type||''}')"><div class="calendar-day-number">${d}</div><div class="calendar-day-label">${workout?workout.description:''}</div></div>`;
        }
        html += `</div><div class="calendar-legend"><div class="legend-item"><div class="legend-color" style="background:var(--calendar-workout);"></div>Тренировка</div><div class="legend-item"><div class="legend-color" style="border:2px solid var(--text-accent);"></div>Сегодня</div></div>`;
        if (isAdmin()) {
            const todayForInput = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;

                <button class="btn-primary" onclick="window.addWorkout()" style="width:100%;">➕ Добавить</button>
                <h4 style="margin:20px 0 10px;">📋 Запланировано:</h4>
                ${appState.schedule.sort((a,b)=>a.date.localeCompare(b.date)).map((w,i)=>`<div class="workout-item"><div><span>${w.date}</span><span class="workout-type type-${w.type}">${w.description}</span></div><button onclick="window.removeWorkout(${i})" class="btn-danger" style="padding:4px 8px;">🗑️</button></div>`).join('')}
            </div>`;
        }
        return html;
    }

        return html;
    }
    
    function renderBattleTab() {
        const my = pairData.admin?.progress||0, pt = pairData.player2?.progress||0;
        const leader = my>pt?FIXED_NAMES.admin:pt>my?FIXED_NAMES.player2:'Ничья';
        let html = `<div style="background:var(--bg-secondary); border-radius:16px; padding:16px;"><h2>⚔️ БАТТЛ</h2>
            <div style="background:var(--bg-tertiary); padding:12px; border-radius:10px; margin:12px 0;"><div style="display:flex; justify-content:space-between;"><span>${FIXED_NAMES.admin} 👑</span><span style="color:var(--success); font-size:24px; font-weight:bold;">+${my.toFixed(1)} кг</span></div></div>
            <div style="background:var(--bg-tertiary); padding:12px; border-radius:10px; margin:12px 0;"><div style="display:flex; justify-content:space-between;"><span>${FIXED_NAMES.player2}</span><span style="color:var(--text-accent); font-size:24px; font-weight:bold;">+${pt.toFixed(1)} кг</span></div></div>
            <div style="text-align:center; padding:20px; background:var(--bg-tertiary); border-radius:12px; margin-top:20px;"><h3>🏆 ${leader} ${leader==='Ничья'?'':'лидирует!'}</h3><p style="font-size:18px; margin-top:8px;">Разница: ${Math.abs(my-pt).toFixed(1)} кг</p></div>`;
        if (isAdmin()) {
            html += `<div class="admin-panel"><div class="admin-title">👑 Админ-панель</div>
                <div class="progress-edit"><span>${FIXED_NAMES.admin}:</span><input type="number" id="editProgress1" value="${my.toFixed(1)}" step="0.5"><button onclick="window.updateProgress('admin')" class="btn-sm btn-primary">✓</button></div>
                <div class="progress-edit"><span>${FIXED_NAMES.player2}:</span><input type="number" id="editProgress2" value="${pt.toFixed(1)}" step="0.5"><button onclick="window.updateProgress('player2')" class="btn-sm btn-primary">✓</button></div>
                <div style="display:flex; gap:8px; margin-top:16px;"><button onclick="window.recalculateProgress()" class="btn-warning" style="flex:1;">🔄 Пересчитать</button><button onclick="window.resetAllProgress()" class="btn-danger" style="flex:1;">⚠️ Сбросить</button></div></div>`;
        }
        html += `</div>`;
        return html;
    }
    
    function renderSettingsTab() {
        return `<div style="background:var(--bg-secondary); border-radius:16px; padding:16px;"><h2>⚙️ Настройки</h2>
            <div style="margin:20px 0; padding:16px; background:var(--bg-tertiary); border-radius:12px;">
                <p><strong>Пара:</strong> ${FIXED_NAMES.admin} и ${FIXED_NAMES.player2}</p>
                <p><strong>Код приглашения:</strong> ${INVITE_CODE}</p>
                <p><strong>Вы вошли как:</strong> ${currentPlayer==='admin'?FIXED_NAMES.admin+' 👑':FIXED_NAMES.player2}</p>
            </div>
            <h3 style="margin:20px 0 10px;">🎨 Тема оформления</h3>
            <div class="theme-selector">
                <div class="theme-btn ${currentTheme==='dark'?'active':''}" onclick="window.setTheme('dark')">🌙 Тёмная</div>
                <div class="theme-btn ${currentTheme==='light'?'active':''}" onclick="window.setTheme('light')">☀️ Светлая</div>
                <div class="theme-btn ${currentTheme==='system'?'active':''}" onclick="window.setTheme('system')">📱 Системная</div>
            </div>
            <button class="btn-warning" onclick="window.syncNow()" style="width:100%; margin-top:8px;">🔄 Синхронизировать</button>
            <button class="btn-danger" onclick="window.switchProfile()" style="width:100%; margin-top:8px;">🚪 Сменить профиль</button>
            <div class="about-section">
                <div style="display:flex; justify-content:center; align-items:center; margin-bottom:8px;"><span style="font-weight:bold;">Gym Battle Pro</span><span class="version-badge">v${APP_VERSION}</span></div>
                <div class="about-text">Приложение сделано Арви для личного использования.<br>Никакого коммерческого смысла программа не преследует.<br>Тренируйтесь с умом и прогрессируйте! 💪</div>
                <div class="about-author">© 2026 Gym Battle</div>
            </div>
        </div>`;
    }
    
    function groupHistoryByMonth(items) {
        const groups = {};
        items.forEach(h => {
            const d = new Date(h.date);
            const key = `${d.getFullYear()}-${d.getMonth()}`;
            if (!groups[key]) groups[key] = { year: d.getFullYear(), month: d.getMonth(), items: [] };
            groups[key].items.push(h);
        });
        return Object.values(groups).sort((a,b)=>b.year-a.year||b.month-a.month);
    }

    window.render = () => { applyTheme(currentTheme); isAuthenticated&&pairData ? renderMainApp() : renderStartScreen(); };
    window.setTheme = (theme) => { applyTheme(theme); render(); };
    window.switchTab = (tab) => { currentTab = tab; render(); };
    window.setStatus = (status) => updateStatus(status);
    window.finishTraining = (isDone) => finishTraining(isDone);
    window.syncNow = async () => { if (pairData) { await loadFromGist(pairData.githubToken, pairData.gistId); render(); alert('✅ Синхронизировано!'); } };
    window.viewPartnerHistory = () => { viewingPartnerHistory = true; render(); };
    window.backFromHistory = () => { viewingPartnerHistory = false; render(); };
    window.toggleHistory = (id) => { expandedHistory[id] = !expandedHistory[id]; render(); };
    window.prevMonth = () => { calendarMonth.setMonth(calendarMonth.getMonth()-1); render(); };
    window.nextMonth = () => { calendarMonth.setMonth(calendarMonth.getMonth()+1); render(); };
    window.selectDate = (dateStr, workoutType) => {
        appState.selectedDate = dateStr;
        if (workoutType) { const idx = DAY_CONFIG.findIndex(d=>d.type===workoutType); if (idx>=0) { appState.currentDayIndex = idx; loadExercises(); } }
        currentTab='training'; viewingPartnerHistory=false; render();
    };
    window.setBank = () => { if(!isAdmin())return; const b=prompt('Сумма:',appState.bank); if(b!==null&&!isNaN(parseFloat(b))){appState.bank=parseFloat(b);saveAppState();render();} };
    window.addExercise = (group) => { const name=prompt('Название:'); if(name){ appState.currentExercises.push({id:Date.now()+Math.random()+'',group,name,sets:[{weight:20,reps:15}]}); render(); } };
    window.deleteEx = (id) => { appState.currentExercises = appState.currentExercises.filter(e=>e.id!==id); render(); };
    window.addSet = (id) => { const ex=appState.currentExercises.find(e=>e.id===id); if(ex){ ex.sets.push({weight:20,reps:12}); render(); } };
    window.removeSet = (id,idx) => { const ex=appState.currentExercises.find(e=>e.id===id); if(ex&&ex.sets.length>1){ ex.sets.splice(idx,1); render(); } };
    window.updateSet = (id,idx,field,val) => { const ex=appState.currentExercises.find(e=>e.id===id); if(ex?.sets[idx]) ex.sets[idx][field]=parseFloat(val)||0; };
    window.updateExName = (id,name) => { const ex=appState.currentExercises.find(e=>e.id===id); if(ex) ex.name=name; };
    window.addWorkout = () => { if(!isAdmin())return; const date=document.getElementById('newWorkoutDate')?.value; const type=document.getElementById('newWorkoutType')?.value; const desc={spina:'Спина+Трицепс',plechi:'Плечи+Пресс',grud:'Грудь+Бицепс'}; if(date&&type){ appState.schedule.push({date,type,description:desc[type]}); saveAppState(); render(); } };
    window.removeWorkout = (i) => { appState.schedule.splice(i,1); saveAppState(); render(); };
    window.deleteHistoryEntry = (id, fallbackIdx) => { if(!isAdmin())return; if(confirm('Удалить запись?')){ const before=appState.history.length; appState.history=appState.history.filter(h=>String(h.id)!==String(id)); if(appState.history.length===before&&fallbackIdx!==undefined) appState.history.splice(fallbackIdx,1); saveAppState(); render(); } };
    window.updateProgress = (player) => { if(!isAdmin())return; const input=player==='admin'?document.getElementById('editProgress1'):document.getElementById('editProgress2'); const val=parseFloat(input?.value); if(!isNaN(val)){ if(player==='admin') pairData.admin.progress=val; else pairData.player2.progress=val; savePairToStorage(); syncWithGist(); render(); } };
    window.recalculateProgress = () => { if(!isAdmin())return; if(confirm('Пересчитать прогресс из истории?')){ pairData.admin.progress=0; pairData.player2.progress=0; appState.history.forEach(h=>{ if(h.completed){ if(h.player==='admin') pairData.admin.progress+=h.progress||2.5; else pairData.player2.progress+=h.progress||2.5; } }); savePairToStorage(); syncWithGist(); render(); } };
    window.resetAllProgress = () => { if(!isAdmin())return; if(confirm('Сбросить весь прогресс?')){ pairData.admin.progress=0; pairData.player2.progress=0; savePairToStorage(); syncWithGist(); render(); } };

    applyTheme(currentTheme);
    render();
})();
</script>
</body>
</html>
